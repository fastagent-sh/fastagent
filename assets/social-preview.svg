<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1e24"/>
      <stop offset="0.55" stop-color="#081419"/>
      <stop offset="1" stop-color="#050d10"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1fb6c9"/>
      <stop offset="1" stop-color="#37d0b6"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <!-- top + bottom accent rules -->
  <rect x="0" y="0" width="1280" height="6" fill="url(#accent)"/>
  <rect x="96" y="544" width="1088" height="1.5" fill="#1c333b"/>

  <!-- eyebrow -->
  <text x="98" y="150" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="24" font-weight="700" letter-spacing="6" fill="#1fb6c9">FROM A DIRECTORY TO A LIVE SERVICE</text>

  <!-- wordmark -->
  <text x="94" y="288" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="132" font-weight="800" fill="#f5f8f9" letter-spacing="-2">FastAgent</text>

  <!-- tagline -->
  <text x="98" y="360" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="42" font-weight="700" fill="url(#accent)">Vibe first. Then FastAgent.</text>

  <!-- one-liner (two lines) -->
  <text x="98" y="436" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="31" font-weight="400" fill="#aebfc5">Turn a local agent directory (AGENTS.md + skills) into a running</text>
  <text x="98" y="478" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="31" font-weight="400" fill="#aebfc5">service &#8212; in your app, on GitHub, in Telegram, or any channel.</text>

  <!-- footer: install command + credit -->
  <text x="98" y="600" font-family="Menlo, DejaVu Sans Mono, monospace"
        font-size="27" fill="#6fe3d0">$ npm i -g @kid7st/fastagent</text>
  <text x="1182" y="600" text-anchor="end" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="24" font-weight="600" fill="#7c9299">Built on pi &#183; MIT &#183; Node &#8805; 22.19</text>

  <!-- decorative prompt glyph, top-right -->
  <g transform="translate(1040,150)" opacity="0.9">
    <rect x="0" y="0" width="150" height="112" rx="14" fill="none" stroke="#1c3b43" stroke-width="3"/>
    <rect x="0" y="0" width="150" height="30" rx="14" fill="#0e2a31"/>
    <circle cx="20" cy="15" r="4.5" fill="#2b4a52"/>
    <circle cx="38" cy="15" r="4.5" fill="#2b4a52"/>
    <circle cx="56" cy="15" r="4.5" fill="#2b4a52"/>
    <text x="20" y="78" font-family="Menlo, DejaVu Sans Mono, monospace" font-size="30" fill="#37d0b6">&#8250; _</text>
  </g>
</svg>
