<svg width="1280" height="400" viewBox="0 0 1280 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c4c9d0"/>
    </linearGradient>
    <linearGradient id="pagebg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0b0d"/>
      <stop offset="1" stop-color="#08090b"/>
    </linearGradient>
    <radialGradient id="pagesheen" cx="0.5" cy="0" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c2c7cf"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="400" fill="url(#pagebg)"/>
  <rect width="1280" height="400" fill="url(#pagesheen)"/>

  <!-- giant faint chevron speed motif, bleeding off the right -->
  <g transform="translate(150,0) skewX(-9)" fill="none" stroke="#ffffff" stroke-opacity="0.045"
     stroke-width="70" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="880,70 1080,200 880,330"/>
    <polyline points="1050,70 1250,200 1050,330"/>
  </g>

  <!-- boxless » mark + live dot -->
  <g transform="translate(58,74) scale(0.92)">
    <g transform="translate(2,0) skewX(-9)" fill="none" stroke="url(#ink)" stroke-width="36"
       stroke-linecap="round" stroke-linejoin="round">
      <polyline points="52,58 112,118 52,178"/>
      <polyline points="114,58 174,118 114,178"/>
    </g>
    <circle cx="176" cy="190" r="15" fill="#f2f3f5"/>
  </g>

  <text x="268" y="210" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="96" font-weight="800" letter-spacing="-2" font-style="italic" fill="url(#word)">FastAgent</text>
  <text x="272" y="268" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="34" font-weight="700" fill="#f4f5f7">Vibe first. Then FastAgent.</text>
  <text x="272" y="312" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="23" font-weight="400" fill="#868b93">An agent directory becomes a live service &#8212; your app, GitHub, Telegram, or any channel.</text>
</svg>
