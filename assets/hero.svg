<svg width="1280" height="400" viewBox="0 0 1280 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="bgg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080d12"/>
      <stop offset="1" stop-color="#0a151a"/>
    </linearGradient>
    <radialGradient id="glowE" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#10b981" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowI" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e181e"/>
      <stop offset="1" stop-color="#0a1216"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.42" cy="0.4" r="0.65">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38dcf0"/>
      <stop offset="0.42" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="400" fill="url(#bgg)"/>
  <ellipse cx="1080" cy="60" rx="620" ry="360" fill="url(#glowE)"/>
  <ellipse cx="160" cy="400" rx="520" ry="320" fill="url(#glowI)"/>
  <rect x="0" y="0" width="1280" height="5" fill="url(#acc)"/>

  <!-- giant faint chevron speed motif, bleeding off the right -->
  <g transform="translate(150,0) skewX(-9)" fill="none" stroke="url(#acc)" stroke-opacity="0.08"
     stroke-width="70" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="880,70 1080,200 880,330"/>
    <polyline points="1050,70 1250,200 1050,330"/>
  </g>

  <!-- mark -->
  <g transform="translate(84,116) scale(0.66)">
    <rect x="2" y="2" width="252" height="252" rx="58" fill="url(#bg)" stroke="#263a42" stroke-width="2"/>
    <rect x="2" y="2" width="252" height="252" rx="58" fill="url(#glow)"/>
    <g transform="translate(6,0) skewX(-9)" fill="none" stroke="url(#acc)" stroke-width="34"
       stroke-linecap="round" stroke-linejoin="round">
      <polyline points="86,74 140,128 86,182"/>
      <polyline points="146,74 200,128 146,182"/>
    </g>
    <circle cx="206" cy="196" r="15" fill="#34d399"/>
    <circle cx="206" cy="196" r="15" fill="none" stroke="#0a1216" stroke-width="5"/>
  </g>

  <!-- wordmark + tagline + one-liner -->
  <text x="292" y="210" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="96" font-weight="800" letter-spacing="-2" font-style="italic" fill="url(#word)">FastAgent</text>
  <text x="296" y="268" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="34" font-weight="700" fill="#eef3f4">Vibe first. Then FastAgent.</text>
  <text x="296" y="312" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="23" font-weight="400" fill="#93a7af">An agent directory becomes a live service &#8212; your app, GitHub, Telegram, or any channel.</text>
</svg>
