<svg width="1280" height="400" viewBox="0 0 1280 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#b9bec6"/>
    </linearGradient>
    <linearGradient id="pagebg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0b0d"/>
      <stop offset="1" stop-color="#08090b"/>
    </linearGradient>
    <radialGradient id="pagesheen" cx="0.5" cy="0" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17181b"/>
      <stop offset="1" stop-color="#0b0c0e"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.4" cy="0.34" r="0.7">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c2c7cf"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="400" fill="url(#pagebg)"/>
  <rect width="1280" height="400" fill="url(#pagesheen)"/>

  <!-- giant faint chevron speed motif, bleeding off the right -->
  <g transform="translate(150,0) skewX(-9)" fill="none" stroke="#ffffff" stroke-opacity="0.045"
     stroke-width="70" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="880,70 1080,200 880,330"/>
    <polyline points="1050,70 1250,200 1050,330"/>
  </g>

  <!-- mark -->
  <g transform="translate(84,116) scale(0.66)">
    <rect x="2" y="2" width="252" height="252" rx="58" fill="url(#badge)" stroke="#2b2e34" stroke-width="2"/>
    <rect x="2" y="2" width="252" height="252" rx="58" fill="url(#sheen)"/>
    <g transform="translate(6,0) skewX(-9)" fill="none" stroke="url(#ink)" stroke-width="34"
       stroke-linecap="round" stroke-linejoin="round">
      <polyline points="86,74 140,128 86,182"/>
      <polyline points="146,74 200,128 146,182"/>
    </g>
    <circle cx="206" cy="196" r="14" fill="#f2f3f5"/>
    <circle cx="206" cy="196" r="14" fill="none" stroke="#0b0c0e" stroke-width="5"/>
  </g>

  <text x="292" y="210" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="96" font-weight="800" letter-spacing="-2" font-style="italic" fill="url(#word)">FastAgent</text>
  <text x="296" y="268" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="34" font-weight="700" fill="#f4f5f7">Vibe first. Then FastAgent.</text>
  <text x="296" y="312" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="23" font-weight="400" fill="#868b93">An agent directory becomes a live service &#8212; your app, GitHub, Telegram, or any channel.</text>
</svg>
