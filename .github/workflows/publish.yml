name: Publish

# Publish @fastagent-sh/fastagent to npm from a GitHub Release via Trusted Publishing (OIDC), with
# provenance and no NPM_TOKEN. The npm trusted publisher must name org fastagent-sh, repo fastagent,
# workflow publish.yml. The release tag is the manual gate; this job verifies that tag against
# package.json and reruns the release checks before publishing.
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # OIDC token for Trusted Publishing

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Check out release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '26'
          registry-url: 'https://registry.npmjs.org'
          scope: '@fastagent-sh'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag matches package version
        run: node -e 'const expected = `v${require("./package.json").version}`; if (process.env.GITHUB_REF_NAME !== expected) { console.error(`release tag ${process.env.GITHUB_REF_NAME} does not match ${expected}`); process.exit(1) }'

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Publish with provenance
        run: npm publish --provenance
