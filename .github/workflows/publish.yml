name: Publish

# Publish @fastagent-sh/fastagent to npm from a GitHub Release via Trusted Publishing (OIDC), with
# provenance and no NPM_TOKEN. Publishing requires the public fastagent-sh/fastagent repository; the
# npm trusted publisher must name org fastagent-sh, repo fastagent, workflow publish.yml, environment
# npm. The protected environment is the manual gate; this job also verifies the tag and commit.
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # OIDC token for Trusted Publishing

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Verify public release repository
        env:
          REPOSITORY: ${{ github.repository }}
          VISIBILITY: ${{ github.event.repository.visibility }}
        run: |
          if [[ "$REPOSITORY" != "fastagent-sh/fastagent" || "$VISIBILITY" != "public" ]]; then
            echo "publishing requires public repository fastagent-sh/fastagent (got $REPOSITORY, $VISIBILITY)" >&2
            exit 1
          fi

      - name: Check out release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Verify release commit is on main
        run: |
          git fetch origin main:refs/remotes/origin/main
          git merge-base --is-ancestor HEAD origin/main || {
            echo "release tag must point to a commit on main" >&2
            exit 1
          }

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '26'
          registry-url: 'https://registry.npmjs.org'
          scope: '@fastagent-sh'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag matches package version
        run: node -e 'const expected = "v" + require("./package.json").version; if (process.env.GITHUB_REF_NAME !== expected) { console.error("release tag " + process.env.GITHUB_REF_NAME + " does not match " + expected); process.exit(1) }'

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Publish with provenance
        run: npm publish --provenance --access public
