name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['22.19.0', '24', '26']
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  package-smoke:
    name: Packed package smoke
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22.19.0'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Pack, install, and import the published surface
        run: |
          tarball=$(npm pack --silent --pack-destination "$RUNNER_TEMP")
          mkdir "$RUNNER_TEMP/package-smoke"
          cd "$RUNNER_TEMP/package-smoke"
          npm init -y
          npm install "$RUNNER_TEMP/$tarball" --ignore-scripts
          node --input-type=module -e 'await import("@fastagent-sh/fastagent"); await import("@fastagent-sh/fastagent/core"); await import("@fastagent-sh/fastagent/pi"); await import("@fastagent-sh/fastagent/github"); await import("@fastagent-sh/fastagent/telegram")'
          ./node_modules/.bin/fastagent --version

  bun-smoke:
    name: Bun 1.3 smoke
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22.19.0'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.3.14'

      - name: Install and build
        run: npm ci && npm run build

      - name: Smoke public imports and CLI
        run: |
          bun -e 'await import("./dist/index.js"); await import("./dist/core.js"); await import("./dist/pi.js"); await import("./dist/github.js"); await import("./dist/telegram.js")'
          bun dist/cli.js models gpt-5.5
          bun dist/cli.js --version

  # Stable-named aggregate gate: this is the branch-protection required check.
  # Keeping a fixed name (independent of the matrix) means adding/removing Node
  # versions never requires editing branch protection. ("Core" = the essential
  # aggregate gate, not the removed core/ directory.)
  core-checks:
    name: Core checks
    needs: [test, package-smoke, bun-smoke]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require all jobs to pass
        run: |
          [ "${{ needs.test.result }}" = "success" ]
          [ "${{ needs.package-smoke.result }}" = "success" ]
          [ "${{ needs.bun-smoke.result }}" = "success" ]
